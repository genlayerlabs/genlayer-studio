sonar.organization=yeagerai
sonar.projectKey=yeagerai_genlayer-simulator

# relative paths to source directories. More details and properties are described
# in https://sonarcloud.io/documentation/project-administration/narrowing-the-focus/
sonar.sources=.
sonar.exclusions=tests/**,frontend/test/**/*
sonar.python.coverage.reportPaths=coverage.xml
# The Sonar scan runs in the backend-unit-tests job and only receives Python
# coverage.xml. Frontend coverage is produced in a separate job and uploaded to
# Codecov, so do not count frontend/explorer sources as uncovered in Sonar.
# examples/contracts are GenVM intelligent-contract fixtures that execute
# inside the GenVM, never under the backend test runner - same rationale.
sonar.coverage.exclusions=frontend/**,explorer/**,examples/contracts/**
# These files mirror the same Studio RPC fee response contracts for separate UI
# apps. Keep CPD focused on executable code until the repo has shared TS types.
sonar.cpd.exclusions=frontend/src/types/responses.ts,explorer/src/lib/types.ts

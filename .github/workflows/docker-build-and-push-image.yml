name: "Docker build and push to Docker Hub"

on:
  workflow_call:
    inputs:
      docker_build_context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      dockerhub_repo:
        required: true
        type: string
      dockerhub_username:
        required: true
        type: string
      build_args:
        required: false
        type: string
        default: ""
      ref:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      dockerhub_token:
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Create .env file
        run: cp .env.example .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.docker_build_context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ inputs.dockerhub_repo }}:${{ inputs.image_tag }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ inputs.dockerhub_repo }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ inputs.dockerhub_repo }}-${{ matrix.arch }}
          provenance: false
          build-args: ${{ inputs.build_args }}

  create-manifest:
    name: Create multi-arch manifest
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub_username }}
          password: ${{ secrets.dockerhub_token }}

      - name: Create and push manifest
        env:
          DOCKERHUB_REPO: ${{ inputs.dockerhub_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          set -euo pipefail

          # Create manifest for versioned tag
          docker manifest create "${DOCKERHUB_REPO}:${IMAGE_TAG}" \
            "${DOCKERHUB_REPO}:${IMAGE_TAG}-amd64" \
            "${DOCKERHUB_REPO}:${IMAGE_TAG}-arm64"
          docker manifest push "${DOCKERHUB_REPO}:${IMAGE_TAG}"

          # Create manifest for latest tag
          docker manifest create "${DOCKERHUB_REPO}:latest" \
            "${DOCKERHUB_REPO}:${IMAGE_TAG}-amd64" \
            "${DOCKERHUB_REPO}:${IMAGE_TAG}-arm64"
          docker manifest push "${DOCKERHUB_REPO}:latest"
